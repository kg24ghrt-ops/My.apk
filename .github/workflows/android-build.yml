name: Android CI/CD Build Debug APK

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build & Upload Debug APK
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 35
          build-tools: 35.0.1

      # 4. Ensure Gradle Wrapper exists
      - name: Ensure Gradle Wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper
          fi
          chmod +x ./gradlew

      # 5. Set timestamp environment variable
      - name: Set timestamp
        run: echo "TIMESTAMP=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      # 6. Build debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 7. Copy APK with timestamp
      - name: Copy APK with timestamp
        run: |
          mkdir -p vkk/apk
          cp app/build/outputs/apk/debug/app-debug.apk vkk/apk/app-debug-$TIMESTAMP.apk

      # 8. Upload APK as artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK-$TIMESTAMP
          path: vkk/apk/app-debug-$TIMESTAMP.apk