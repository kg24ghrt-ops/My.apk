name: Android CI/CD Build Unsigned APK

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build & Upload Unsigned APK
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 35
          build-tools: 35.0.1

      # 4. Ensure Gradle Wrapper exists
      - name: Ensure Gradle Wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper
          fi
          chmod +x ./gradlew

      # 5. Build unsigned release APK
      - name: Build Unsigned APK
        run: |
          ./gradlew assembleRelease -x signRelease

      # 6. Copy APK to vkk/apk with timestamp
      - name: Copy APK with timestamp
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          mkdir -p vkk/apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk vkk/apk/app-release-unsigned-$TIMESTAMP.apk
          echo "APK_PATH=vkk/apk/app-release-unsigned-$TIMESTAMP.apk" >> $GITHUB_ENV

      # 7. Upload APK as workflow artifact (v4)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-APK-${{ github.run_id }}
          path: ${{ env.APK_PATH }}