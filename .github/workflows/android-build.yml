name: Android CI/CD Build Debug APK

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build & Upload Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Ensure Gradle Wrapper exists
      - name: Ensure Gradle Wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper
          fi
          chmod +x ./gradlew

      # 4. Build debug APK
      - name: Build Debug APK
        run: |
          ./gradlew clean assembleDebug
          mkdir -p vkk/apk
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          cp app/build/outputs/apk/debug/app-debug.apk vkk/apk/app-debug-$TIMESTAMP.apk
          echo "APK_PATH=vkk/apk/app-debug-$TIMESTAMP.apk" >> $GITHUB_ENV

      # 5. Upload APK as artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: ${{ env.APK_PATH }}